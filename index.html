function CigarScanner() {
  const [screen, setScreen] = useState("home"); // home | scanning | result | edit
  const [result, setResult] = useState(null);
  const [unknown, setUnknown] = useState(null); // identification non présente en base
  const [errorMsg, setErrorMsg] = useState(null);
  const [imgUrl, setImgUrl] = useState(null);
  const [query, setQuery] = useState("");
  const [saved, setSaved] = useState({});   // fiches corrigées par l'utilisateur (depuis le stockage local)
  const [draft, setDraft] = useState(null);  // fiche en cours d'édition dans le formulaire
  const [scanPhoto, setScanPhoto] = useState(null); // vignette de la dernière photo scannée
  const [indice, setIndice] = useState(""); // indice marque/modèle saisi avant la photo
  const [confirmDelete, setConfirmDelete] = useState(false); // confirmation de suppression de fiche
  const fileRef = useRef(null);
  const importRef = useRef(null);
  const editPhotoRef = useRef(null);

  const STORAGE_KEY = "humidor_fiches_v1";

  // Au démarrage : charger les fiches enregistrées sur cet appareil.
  React.useEffect(() => {
    try {
      const raw = window.localStorage.getItem(STORAGE_KEY);
      if (raw) setSaved(JSON.parse(raw));
    } catch (e) { /* stockage indisponible : on continue sans */ }
  }, []);

  // Enregistre une fiche corrigée (clé = marque+vitole en minuscules).
  // oldKey : si fournie et différente, l'ancienne entrée est retirée (renommage).
  const persistFiche = (fiche, oldKey) => {
    const key = `${fiche.marque}|${fiche.vitole}`.toLowerCase().trim();
    const next = { ...saved };
    if (oldKey && oldKey !== key) delete next[oldKey];
    next[key] = { ...fiche, isUserSaved: true };
    setSaved(next);
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch (e) {}
  };

  // Supprime définitivement une fiche enregistrée (par sa clé marque|vitole).
  const deleteFiche = (fiche) => {
    const key = `${fiche.marque}|${fiche.vitole}`.toLowerCase().trim();
    const next = { ...saved };
    delete next[key];
    setSaved(next);
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch (e) {}
    reset();
  };

  // Télécharge un fichier de sauvegarde (toute la cave + le carnet, photos comprises).
  const exportData = () => {
    try {
      const data = JSON.stringify({ version: 1, date: new Date().toISOString(), fiches: saved }, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `humidor-sauvegarde-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      setErrorMsg("La sauvegarde n'a pas pu être créée.");
    }
  };

  // Réimporte un fichier de sauvegarde (fusionne avec l'existant).
  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(String(r.result));
        const incoming = parsed.fiches || parsed; // tolère deux formats
        const merged = { ...saved, ...incoming };
        setSaved(merged);
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        setErrorMsg(null);
        setScreen("home");
      } catch (err) {
        setErrorMsg("Fichier de sauvegarde illisible ou invalide.");
      }
    };
    r.onerror = () => setErrorMsg("Lecture du fichier impossible.");
    r.readAsText(file);
    if (importRef.current) importRef.current.value = "";
  };

  // ⬇️ Une fois le Worker déployé (voir DEPLOIEMENT.md), colle son URL ici.
  // Tant que c'est laissé vide, l'app reste en mode démonstration.
  const WORKER_URL = "https://humidor-worker.humidor-cigares.workers.dev";

  // Cherche d'abord dans les fiches enregistrées par l'utilisateur, puis dans la base maison.
  const lookupSaved = (id) => {
    if (!id || !id.marque) return null;
    const m = id.marque.toLowerCase();
    const v = (id.vitole || "").toLowerCase();
    const vals = Object.values(saved);
    return (
      vals.find((c) => c.marque.toLowerCase().includes(m) && v && c.vitole.toLowerCase().includes(v)) ||
      vals.find((c) => c.marque.toLowerCase().includes(m)) ||
      null
    );
  };

  const filtered = CIGAR_DB.filter((c) => {
    const q = query.trim().toLowerCase();
    if (!q) return true;
    return `${c.marque} ${c.vitole} ${c.origine} ${c.gamme}`.toLowerCase().includes(q);
  });

  // Cigares fumés et enregistrés → "Carnet" (dégustations)
  const degustes = Object.values(saved).filter((c) => c.deguste);
  // Cigares enregistrés non encore fumés → "Ma cave" (stock)
  const enStock = Object.values(saved).filter((c) => !c.deguste);

  // Extrait un montant en euros depuis un texte de prix ("13,30 €" → 13.30).
  const parsePrix = (txt) => {
    if (!txt) return 0;
    const m = String(txt).replace(",", ".").match(/(\d+(\.\d+)?)/);
    return m ? parseFloat(m[1]) : 0;
  };
  // Total dépensé = somme des prix des cigares fumés (prix FR, sinon prix US ignoré).
  const totalFume = degustes.reduce((sum, c) => sum + parsePrix(c.prixFR), 0);

  // Recherche + tri appliqués aux listes personnelles (cave / carnet)
  const [caveQuery, setCaveQuery] = useState("");
  const [caveSort, setCaveSort] = useState("recent"); // recent | note | marque | origine

  const applySearchSort = (list, withNote) => {
    const q = caveQuery.trim().toLowerCase();
    let out = list.filter((c) =>
      !q || `${c.marque} ${c.vitole} ${c.origine}`.toLowerCase().includes(q)
    );
    out = [...out].sort((a, b) => {
      if (caveSort === "marque") return a.marque.localeCompare(b.marque);
      if (caveSort === "origine") return (a.origine || "").localeCompare(b.origine || "");
      if (caveSort === "note" && withNote) return (b.note || 0) - (a.note || 0);
      return 0; // "recent" : on garde l'ordre d'insertion
    });
    return out;
  };

  // Statistiques du carnet
  const noteMoyenne = degustes.length
    ? (degustes.reduce((s, c) => s + (c.note || 0), 0) / degustes.filter((c) => c.note).length)
    : 0;
  const origineTop = (() => {
    const counts = {};
    degustes.forEach((c) => { if (c.origine && c.origine !== "Origine indéterminée") counts[c.origine] = (counts[c.origine] || 0) + 1; });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return top ? top[0] : null;
  })();

  // Convertit un fichier image en base64 (sans le préfixe data:)
  const fileToBase64 = (file) =>
    new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result).split(",")[1]);
      r.onerror = reject;
      r.readAsDataURL(file);
    });

  // Réduit + compresse une photo en une petite vignette (data URL) pour le stockage local.
  // ~400px de large, qualité 0.7 → quelques dizaines de Ko au lieu de plusieurs Mo.
  const fileToThumb = (file) =>
    new Promise((resolve) => {
      try {
        const r = new FileReader();
        r.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxW = 400;
            const scale = Math.min(1, maxW / img.width);
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.7));
          };
          img.onerror = () => resolve(null);
          img.src = r.result;
        };
        r.onerror = () => resolve(null);
        r.readAsDataURL(file);
      } catch (e) { resolve(null); }
    });

  // Rapproche l'identification du modèle d'une entrée de la base.
  const matchInDb = (id) => {
    if (!id || !id.marque) return null;
    const m = id.marque.toLowerCase();
    const v = (id.vitole || "").toLowerCase();
    // 1) marque + vitole, 2) à défaut marque seule
    return (
      CIGAR_DB.find((c) => c.marque.toLowerCase().includes(m) && v && c.vitole.toLowerCase().includes(v)) ||
      CIGAR_DB.find((c) => c.marque.toLowerCase().includes(m)) ||
      null
    );
  };

  const handleCapture = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImgUrl(URL.createObjectURL(file));
    setErrorMsg(null);

    // Génère une vignette compressée, conservée pour l'enregistrement éventuel.
    fileToThumb(file).then((thumb) => setScanPhoto(thumb));

    // Pas de Worker configuré → on reste en démo
    if (!WORKER_URL) {
      runDemo();
      return;
    }

    setScreen("scanning");
    try {
      const imageBase64 = await fileToBase64(file);
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imageBase64, mediaType: file.type || "image/jpeg", indice: indice.trim() }),
      });
      if (!res.ok) throw new Error("Le serveur de reconnaissance a renvoyé une erreur.");
      const id = await res.json();

      // Priorité 1 : une fiche que TU as déjà corrigée/enregistrée sur cet appareil.
      const mine = lookupSaved(id);
      // Priorité 2 : la base maison (prix français exacts).
      const found = mine || matchInDb(id);

      if (found) {
        setUnknown(null);
        setResult(found);
        setScreen("result");
      } else if (id && id.marque) {
        // Identifié par Claude mais absent de ta base maison :
        // on construit une fiche à partir de ce qu'il a renvoyé.
        // Prix français inconnu → "--€". Prix US affiché si Claude en donne un.
        setResult({
          id: "ai-" + Date.now(),
          marque: id.marque,
          vitole: id.vitole || "—",
          origine: id.origine || "Origine indéterminée",
          region: id.region || id.origine || "—",
          cape: id.cape || "—",
          force: id.force || "—",
          forceLevel: Number.isInteger(id.forceLevel) ? id.forceLevel : 0,
          format: id.format || "—",
          longueur: "—",
          cepo: "—",
          duree: id.duree || "—",
          gamme: "Fiche IA",
          prixFR: null,           // jamais de prix € inventé
          dispoFR: false,
          prixAlt: id.prixUSD ? `${id.prixUSD} (indicatif US)` : "--€",
          notes: id.notes || "Profil non renseigné pour ce cigare.",
          confiance: id.confiance,
          remarque: id.remarque,
          accent: "#6B5335",
          isAI: true,
        });
        setUnknown(null);
        setScreen("result");
      } else {
        // Bague illisible / marque inconnue → écran honnête
        setResult(null);
        setUnknown(id);
        setScreen("result");
      }
    } catch (err) {
      setErrorMsg("Impossible de joindre le serveur de reconnaissance. Vérifie l'URL du Worker et ta connexion.");
      setScreen("home");
    }
  };

  // Mode démonstration : tire un cigare au hasard (sans appel réseau)
  const runDemo = () => {
    setErrorMsg(null);
    setScreen("scanning");
    setTimeout(() => {
      const pick = CIGAR_DB[Math.floor(Math.random() * CIGAR_DB.length)];
      setUnknown(null);
      setResult(pick);
      setScreen("result");
    }, 2600);
  };

  const reset = () => {
    setScreen("home");
    setResult(null);
    setUnknown(null);
    setImgUrl(null);
    setDraft(null);
    setScanPhoto(null);
    setIndice("");
    setConfirmDelete(false);
    if (fileRef.current) fileRef.current.value = "";
  };

  // Ouvre le formulaire vide pour saisir un cigare à la main (sans scan).
  const addManual = () => {
    setResult(null);
    setUnknown(null);
    setScanPhoto(null);
    setDraft({
      editId: null, editKey: null,
      marque: "", vitole: "", origine: "", region: "", cape: "", force: "",
      forceLevel: 0, format: "", longueur: "", cepo: "", duree: "",
      prixFR: "", prixUSD: "", tripe: "", notes: "", avis: "", achat: "",
      deguste: false, dateDeguste: "", note: 0, photo: null, accent: "#6B5335",
    });
    setScreen("edit");
  };

  // Ouvre le formulaire de correction, pré-rempli avec la fiche affichée
  // (qu'elle vienne de l'IA, de la base maison, ou d'un écran "illisible").
  const openEditor = () => {
    const base = result || {};
    setDraft({
      // Si la fiche est déjà une fiche enregistrée par l'utilisateur, on retient
      // son id et sa clé pour l'ÉCRASER au lieu d'en créer une nouvelle.
      editId: base.isUserSaved ? base.id : null,
      editKey: base.isUserSaved ? `${base.marque}|${base.vitole}`.toLowerCase().trim() : null,
      marque: base.marque || (unknown && unknown.marque) || "",
      vitole: base.vitole && base.vitole !== "—" ? base.vitole : "",
      origine: base.origine && base.origine !== "Origine indéterminée" ? base.origine : "",
      region: base.region && base.region !== "—" ? base.region : "",
      cape: base.cape && base.cape !== "—" ? base.cape : "",
      force: base.force && base.force !== "—" ? base.force : "",
      forceLevel: base.forceLevel || 0,
      format: base.format && base.format !== "—" ? base.format : "",
      longueur: base.longueur && base.longueur !== "—" ? base.longueur : "",
      cepo: base.cepo && base.cepo !== "—" ? base.cepo : "",
      duree: base.duree && base.duree !== "—" ? base.duree : "",
      prixFR: base.prixFR || "",
      prixUSD: base.prixUSDraw || "",
      tripe: base.tripe && base.tripe !== "—" ? base.tripe : "",
      notes: base.notes && !base.notes.startsWith("Profil non") ? base.notes : "",
      avis: base.avis || "",
      achat: base.achat || "",
      deguste: base.deguste || false,
      dateDeguste: base.dateDeguste || "",
      note: base.note || 0,
      photo: base.photo || scanPhoto || null,
      accent: base.accent || "#6B5335",
    });
    setScreen("edit");
  };

  const updateDraft = (field, value) => setDraft((d) => ({ ...d, [field]: value }));

  // Photo choisie depuis le formulaire (caméra ou photothèque) → vignette dans le draft.
  const handleEditPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const thumb = await fileToThumb(file);
    if (thumb) updateDraft("photo", thumb);
    if (editPhotoRef.current) editPhotoRef.current.value = "";
  };

  // Enregistre la fiche corrigée et l'affiche.
  const saveDraft = () => {
    if (!draft.marque.trim()) return; // la marque est le minimum requis
    const hasFR = draft.prixFR && draft.prixFR.trim() && draft.prixFR.trim() !== "--€";
    const hasUSD = draft.prixUSD && draft.prixUSD.trim();
    const fiche = {
      // On réutilise l'id existant en cas de modification, sinon on en crée un.
      id: draft.editId || ("saved-" + Date.now()),
      marque: draft.marque.trim(),
      vitole: draft.vitole.trim() || "—",
      origine: draft.origine.trim() || "Origine indéterminée",
      region: draft.region.trim() || draft.origine.trim() || "—",
      cape: draft.cape.trim() || "—",
      force: draft.force.trim() || "—",
      forceLevel: Number(draft.forceLevel) || 0,
      format: draft.format.trim() || "—",
      longueur: draft.longueur.trim() || "—",
      cepo: draft.cepo.trim() || "—",
      duree: draft.duree.trim() || "—",
      tripe: draft.tripe.trim() || "—",
      gamme: "Ma cave",
      prixFR: hasFR ? draft.prixFR.trim() : null,
      dispoFR: hasFR,
      prixUSDraw: hasUSD ? draft.prixUSD.trim() : "",
      prixAlt: hasFR ? null : (hasUSD ? `${draft.prixUSD.trim()} (indicatif US)` : "--€"),
      notes: draft.notes.trim() || "Profil non renseigné.",
      avis: draft.avis.trim() || "",
      achat: draft.achat.trim() || "",
      deguste: !!draft.deguste,
      dateDeguste: draft.deguste ? (draft.dateDeguste.trim() || "") : "",
      note: draft.deguste ? (Number(draft.note) || 0) : 0,
      photo: draft.photo || null,
      accent: draft.accent,
      isUserSaved: true,
    };
    // Si on modifiait une fiche dont la marque/vitole a changé, l'ancienne clé
    // doit être retirée pour ne pas laisser un doublon fantôme.
    const newKey = `${fiche.marque}|${fiche.vitole}`.toLowerCase().trim();
    persistFiche(fiche, draft.editKey && draft.editKey !== newKey ? draft.editKey : null);
    setResult(fiche);
    setUnknown(null);
    setScreen("result");
  };

  return (
    <div style={styles.app}>
      <style>{globalCss}</style>

      {/* Texture / grain overlay */}
      <div style={styles.grain} />

      {/* HEADER */}
      <header style={styles.header}>
        <div style={styles.brandMark}>
          <span style={styles.brandGlyph}>❦</span>
        </div>
        <div>
          <h1 style={styles.brandName}>HUMIDOR</h1>
          <p style={styles.brandSub}>identification · provenance · prix</p>
        </div>
      </header>

      {/* HOME */}
      {screen === "home" && (
        <main style={styles.main} className="fade-up">
          <div style={styles.heroBlock}>
            <p style={styles.kicker}>Scanner un cigare</p>
            <h2 style={styles.heroTitle}>
              Une photo de la bague.<br />
              <em style={styles.heroEm}>Tout le reste suit.</em>
            </h2>
            <p style={styles.heroText}>
              Pointez la bague du cigare. L'app identifie la marque, le module,
              la provenance et affiche le prix homologué en France.
            </p>
          </div>

          {errorMsg && (
            <div style={styles.errorBanner}>{errorMsg}</div>
          )}

          <div style={styles.indiceWrap}>
            <input
              value={indice}
              onChange={(e) => setIndice(e.target.value)}
              placeholder="Indice (facultatif) : marque ou module connu…"
              style={styles.indiceInput}
            />
            {indice && (
              <button onClick={() => setIndice("")} style={styles.searchClear}><X size={14} /></button>
            )}
          </div>

          <button style={styles.captureBtn} onClick={() => fileRef.current?.click()} className="capture-btn">
            <Camera size={22} strokeWidth={1.6} />
            <span>Prendre une photo</span>
          </button>
          <div style={styles.twinBtnRow}>
            <button style={styles.twinBtn} onClick={addManual} className="demo-btn">
              Ajouter sans scanner
            </button>
            <button style={styles.twinBtn} onClick={runDemo} className="demo-btn">
              Essayer en démo
            </button>
          </div>

          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            onChange={handleCapture}
            style={{ display: "none" }}
          />

          <div style={styles.accessRow}>
            <button style={styles.accessHalf} onClick={() => setScreen("cave")} className="recent-row">
              <Leaf size={17} style={{ color: "#c4a46c" }} />
              <span style={styles.accessHalfLabel}>Ma cave</span>
              <span style={styles.accessHalfCount}>{enStock.length}</span>
            </button>
            <button style={styles.accessHalf} onClick={() => setScreen("carnet")} className="recent-row">
              <Flame size={17} style={{ color: "#c4a46c" }} />
              <span style={styles.accessHalfLabel}>Carnet</span>
              <span style={styles.accessHalfCount}>{degustes.length}</span>
            </button>
          </div>

          <div style={styles.recentBlock}>
            <div style={styles.caveHead}>
              <p style={styles.recentLabel}>Catalogue · {CIGAR_DB.length} cigares</p>
            </div>
            <div style={styles.searchWrap}>
              <Search size={15} style={{ color: "#7a6a52", flexShrink: 0 }} />
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Marque, origine, gamme…"
                style={styles.searchInput}
              />
              {query && (
                <button onClick={() => setQuery("")} style={styles.searchClear}><X size={14} /></button>
              )}
            </div>
            {filtered.map((c) => (
              <button key={c.id} style={styles.recentRow} onClick={() => { setResult(c); setScreen("result"); }} className="recent-row">
                <span style={{ ...styles.recentDot, background: c.accent }} />
                <span style={styles.recentTextWrap}>
                  <span style={styles.recentName}>{c.marque} <span style={styles.recentVitole}>{c.vitole}</span></span>
                  <span style={styles.recentMeta}>{c.origine} · {c.gamme}</span>
                </span>
                <span style={styles.recentPrice}>{c.dispoFR ? c.prixFR : "hors FR"}</span>
                <ChevronRight size={16} style={{ color: "#6b5d49", flexShrink: 0 }} />
              </button>
            ))}
            {filtered.length === 0 && (
              <p style={styles.noResult}>Aucun cigare ne correspond à « {query} ».</p>
            )}
          </div>

          {/* Sauvegarde */}
          <div style={styles.backupRow}>
            <button style={styles.backupBtn} onClick={exportData} className="demo-btn">Sauvegarder ma cave</button>
            <button style={styles.backupBtn} onClick={() => importRef.current?.click()} className="demo-btn">Restaurer</button>
          </div>
          <input
            ref={importRef}
            type="file"
            accept="application/json,.json"
            onChange={importData}
            style={{ display: "none" }}
          />
          <p style={styles.backupHint}>
            Enregistre un fichier de ta cave (dans Fichiers ou iCloud) pour la retrouver si tu vides Safari ou changes d'appareil.
          </p>
        </main>
      )}

      {/* SCANNING */}
      {screen === "scanning" && (
        <main style={styles.scanMain}>
          <div style={styles.scanFrame}>
            {imgUrl ? (
              <img src={imgUrl} alt="cigare" style={styles.scanImg} />
            ) : (
              <div style={styles.scanPlaceholder} />
            )}
            <div style={styles.scanLine} className="scan-line" />
            <div style={styles.scanCorner} className="c-tl" />
            <div style={styles.scanCorner} className="c-tr" />
            <div style={styles.scanCorner} className="c-bl" />
            <div style={styles.scanCorner} className="c-br" />
          </div>
          <div style={styles.scanStatus}>
            <Loader2 size={18} className="spin" />
            <span>Lecture de la bague…</span>
          </div>
          <p style={styles.scanHint}>Identification de la marque et du module</p>
        </main>
      )}

      {/* RESULT */}
      {screen === "result" && result && (
        <main style={styles.resultMain} className="fade-up" key={result.id}>
          <button style={styles.closeBtn} onClick={reset} className="close-btn">
            <X size={18} />
          </button>

          <div style={{ ...styles.resultHero, background: `linear-gradient(135deg, ${result.accent}, #2a1d12)` }}>
            {result.photo && (
              <img src={result.photo} alt={result.marque} style={styles.resultPhoto} />
            )}
            <p style={styles.resultOrigin}>{result.origine}</p>
            <h2 style={styles.resultMarque}>{result.marque}</h2>
            <p style={styles.resultVitole}>{result.vitole}</p>
            <span style={styles.gammeBadge}>{result.gamme}</span>
          </div>

          {/* PRIX */}
          <div style={styles.priceCard}>
            <div>
              <p style={styles.priceLabel}>
                {result.dispoFR ? "Prix homologué France" : "Prix France indisponible"}
              </p>
              <p style={styles.priceValue}>{result.dispoFR ? result.prixFR : result.prixAlt}</p>
            </div>
            <Coins size={28} style={{ color: result.accent, opacity: 0.8 }} strokeWidth={1.4} />
          </div>

          {/* STATS */}
          <div style={styles.statGrid}>
            <Stat icon={<MapPin size={16} />} label="Provenance" value={result.region} />
            <Stat icon={<Leaf size={16} />} label="Cape" value={result.cape} />
            <Stat
              icon={<Ruler size={16} />}
              label="Module"
              value={result.isAI
                ? result.format
                : `${result.format} · ${result.longueur} · cepo ${result.cepo}`}
            />
            <Stat icon={<Clock size={16} />} label="Durée" value={result.duree} />
          </div>

          {/* FORCE */}
          <div style={styles.forceBlock}>
            <div style={styles.forceHead}>
              <Flame size={16} style={{ color: result.accent }} />
              <span style={styles.forceLabel}>Force — {result.force}</span>
            </div>
            <div style={styles.forceBar}>
              {[1, 2, 3, 4, 5].map((n) => (
                <span key={n} style={{ ...styles.forcePip, background: n <= result.forceLevel ? result.accent : "#3a2f23" }} />
              ))}
            </div>
          </div>

          {/* NOTES */}
          <div style={styles.notesBlock}>
            <p style={styles.notesLabel}>Profil de dégustation</p>
            <p style={styles.notesText}>{result.notes}</p>
          </div>

          {result.tripe && result.tripe !== "—" && (
            <div style={styles.notesBlock}>
              <p style={styles.notesLabel}>Sous-cape / tripe</p>
              <p style={styles.metaLine}>{result.tripe}</p>
            </div>
          )}

          {result.deguste && (
            <div style={styles.degusteBlock}>
              <p style={styles.notesLabel}>Ma dégustation</p>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <Stars value={result.note} size={22} />
                <span style={styles.noteNum}>{Number(result.note) ? Number(result.note).toFixed(2).replace(/\.?0+$/, "") : "0"} / 5</span>
              </div>
              {result.dateDeguste && <p style={styles.degusteDate}>Fumé le {result.dateDeguste}</p>}
            </div>
          )}

          {result.avis && (
            <div style={styles.avisBlock}>
              <p style={styles.notesLabel}>Mon appréciation</p>
              <p style={styles.notesText}>{result.avis}</p>
            </div>
          )}

          {result.achat && (
            <p style={styles.achatLine}>Acheté : {result.achat}</p>
          )}

          <button style={styles.againBtn} onClick={reset} className="again-btn">
            Scanner un autre cigare
          </button>

          <button style={styles.editBtn} onClick={openEditor} className="demo-btn">
            {result.isUserSaved ? "Modifier cette fiche" : "Corriger / enregistrer dans ma cave"}
          </button>

          {result.isUserSaved && (
            confirmDelete ? (
              <div style={styles.deleteConfirm}>
                <p style={styles.deleteConfirmText}>Supprimer définitivement cette fiche ?</p>
                <div style={styles.deleteConfirmRow}>
                  <button style={styles.deleteYes} onClick={() => deleteFiche(result)}>Oui, supprimer</button>
                  <button style={styles.deleteNo} onClick={() => setConfirmDelete(false)}>Annuler</button>
                </div>
              </div>
            ) : (
              <button style={styles.deleteBtn} onClick={() => setConfirmDelete(true)}>Supprimer cette fiche</button>
            )
          )}

          {result.isUserSaved ? (
            <p style={styles.disclaimer}>
              Fiche enregistrée par tes soins sur cet appareil. C'est elle qui s'affiche en priorité
              quand tu rescannes ce cigare.
            </p>
          ) : result.isAI ? (
            <p style={styles.disclaimer}>
              Fiche établie par reconnaissance, à partir des connaissances générales sur ce cigare
              {result.confiance ? ` · confiance : ${result.confiance}` : ""}. Prix français : « --€ ».
              Si une info est inexacte, corrige-la : ta version sera mémorisée.
            </p>
          ) : (
            <p style={styles.disclaimer}>
              Prix issu des tarifs homologués en France. À actualiser à chaque arrêté du Journal Officiel.
            </p>
          )}
        </main>
      )}

            <Field label="Pays de production" value={draft.origine} onChange={(v) => updateDraft("origine", v)} placeholder="Ex : Honduras" />
            <Field label="Terroir / région" value={draft.region} onChange={(v) => updateDraft("region", v)} placeholder="Ex : Nicaragua" />
            <Field label="Cape" value={draft.cape} onChange={(v) => updateDraft("cape", v)} placeholder="Ex : Maduro Équateur" />
            <Field label="Force (en mots)" value={draft.force} onChange={(v) => updateDraft("force", v)} placeholder="Ex : Corsée" />

            <div style={styles.fieldBlock}>

            <Field label="Durée" value={draft.duree} onChange={(v) => updateDraft("duree", v)} placeholder="60–80 min" />
            <Field label="Sous-cape / tripe" value={draft.tripe} onChange={(v) => updateDraft("tripe", v)} placeholder="Ex : Nicaragua, Honduras" />
            <div style={styles.fieldRow}>
              <Field label="Prix payé en France" value={draft.prixFR} onChange={(v) => updateDraft("prixFR", v)} placeholder="14,50 €" half />
              <Field label="Prix US (indicatif)" value={draft.prixUSD} onChange={(v) => updateDraft("prixUSD", v)} placeholder="~12 $" half />
            </div>
            <Field label="Acheté le / chez (facultatif)" value={draft.achat} onChange={(v) => updateDraft("achat", v)} placeholder="Ex : mars 2026, La Civette" />

            <div style={styles.degusteToggle} onClick={() => updateDraft("deguste", !draft.deguste)}>

                {draft.deguste ? "✓" : ""}
              </span>
              <span style={styles.degusteLabel}>Je l'ai fumé — ajouter à Ma cave</span>
            </div>

            {draft.deguste && (
              <div style={styles.degustePanel}>
                <Field label="Date de dégustation" value={draft.dateDeguste} onChange={(v) => updateDraft("dateDeguste", v)} placeholder="Ex : 30 mai 2026" />
                <div style={styles.fieldBlock}>
                  <label style={styles.fieldLabel}>Ma note — {Number(draft.note) ? Number(draft.note).toFixed(2).replace(/\.?0+$/, "") : "0"} / 5</label>

                  <input

                    min="0" max="5" step="0.25"

                    onChange={(e) => updateDraft("note", parseFloat(e.target.value))}

                  />

              </div>

            <div style={styles.fieldBlock}>
              <label style={styles.fieldLabel}>Profil de dégustation</label>
              <textarea
                value={draft.notes}
                onChange={(e) => updateDraft("notes", e.target.value)}

                style={styles.textarea}
                rows={3}

            <div style={styles.fieldBlock}>
              <label style={styles.fieldLabel}>Mon appréciation personnelle</label>
              <textarea
                value={draft.avis}
                onChange={(e) => updateDraft("avis", e.target.value)}

                style={styles.textarea}
                rows={3}

          </div>

          <button
            style={{ ...styles.captureBtn, margin: "8px 24px 0", width: "calc(100% - 48px)", opacity: draft.marque.trim() ? 1 : 0.5 }}

      {/* MA CAVE — stock de cigares enregistrés non fumés */}

              </p>
            </div>
          ) : (
            <>
              <ListControls query={caveQuery} setQuery={setCaveQuery} sort={caveSort} setSort={setCaveSort} withNote={false} />

                {applySearchSort(enStock, false).map((c) => (

                    onClick={() => { setUnknown(null); setResult(c); setScreen("result"); }}

                      <span style={styles.caveCardDate}>{c.origine}{c.dispoFR && c.prixFR ? ` · ${c.prixFR}` : ""}</span>

                  </button>

          <button style={styles.againBtn} onClick={reset} className="again-btn">

        </main>

      {/* CARNET — cigares fumés, avec note et date */}
      {screen === "carnet" && (
        <main style={styles.resultMain} className="fade-up">
          <button style={styles.closeBtn} onClick={reset} className="close-btn">
            <X size={18} />
          </button>

          <div style={styles.caveHeader}>
            <p style={styles.kicker}>Carnet de dégustation</p>

function Field({ label, value, onChange, placeholder, half }) {
  return (
    <div style={{ ...fieldBlockStyle, ...(half ? { flex: 1 } : {}) }}>
      <label style={fieldLabelStyle}>{label}</label>
      <input
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        style={fieldInputStyle}
      />
    </div>
  );
}

// Listes de valeurs standard pour les cigares
const FORMATS = ["Petit Corona", "Corona", "Corona Gorda", "Robusto", "Robusto Extra", "Toro", "Grand Toro", "Churchill", "Double Corona", "Pirámide", "Torpedo", "Petit Robusto", "Panetela", "Lancero", "Perla", "Half Corona"];
const LONGUEURS = ["100 mm (3.9\")", "110 mm (4.3\")", "120 mm (4.7\")", "124 mm (4.9\")", "127 mm (5.0\")", "129 mm (5.1\")", "140 mm (5.5\")", "143 mm (5.6\")", "150 mm (5.9\")", "155 mm (6.1\")", "159 mm (6.3\")", "165 mm (6.5\")", "178 mm (7.0\")", "194 mm (7.6\")"];
const CEPOS = ["38", "40", "42", "43", "44", "46", "48", "50", "52", "54", "56", "58", "60"];

// Champ à liste déroulante avec option "Autre…" (bascule en saisie libre)
function SelectField({ label, value, onChange, options, placeholder, half }) {
  const isCustom = value && !options.includes(value);
  const [custom, setCustom] = React.useState(isCustom);
  return (
    <div style={{ ...fieldBlockStyle, ...(half ? { flex: 1 } : {}) }}>
      <label style={fieldLabelStyle}>{label}</label>
      {custom ? (
        <div style={{ display: "flex", gap: 6 }}>
          <input
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            style={{ ...fieldInputStyle, flex: 1 }}
            autoFocus
          />
          <button
            onClick={() => { setCustom(false); onChange(""); }}
            style={selectBackStyle}
            title="Revenir à la liste"
          >☰</button>
        </div>
      ) : (
        <select
          value={options.includes(value) ? value : ""}
          onChange={(e) => {
            if (e.target.value === "__autre__") { setCustom(true); onChange(""); }
            else onChange(e.target.value);
          }}
          style={fieldInputStyle}
        >
          <option value="">— choisir —</option>
          {options.map((o) => <option key={o} value={o}>{o}</option>)}
          <option value="__autre__">Autre… (saisie libre)</option>
        </select>
      )}
    </div>
  );
}
const selectBackStyle = { width: 44, background: "#160f0a", border: "1px solid rgba(180,150,100,0.18)", borderRadius: 3, color: "#a98e5e", fontSize: 16, cursor: "pointer", flexShrink: 0 };

// Barre recherche + tri pour les listes Ma cave / Carnet
function ListControls({ query, setQuery, sort, setSort, withNote }) {
  return (
    <div style={{ padding: "12px 24px 0" }}>
      <div style={listSearchWrap}>
        <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Rechercher…" style={listSearchInput} />
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
        {[["recent", "Récents"], ["marque", "Marque"], ["origine", "Origine"], ...(withNote ? [["note", "Note"]] : [])].map(([k, lbl]) => (
          <button
            key={k}
            onClick={() => setSort(k)}
            style={{
              padding: "6px 14px", borderRadius: 20, fontSize: 13, cursor: "pointer",
              fontFamily: "'Cormorant Garamond', serif", letterSpacing: "0.04em",
              border: "1px solid " + (sort === k ? "rgba(196,164,108,0.6)" : "rgba(180,150,100,0.2)"),
              background: sort === k ? "rgba(196,164,108,0.15)" : "transparent",
              color: sort === k ? "#e7cd92" : "#8a7a60",
            }}
          >{lbl}</button>
        ))}
      </div>
    </div>
  );
}
const listSearchWrap = { display: "flex", alignItems: "center", padding: "10px 14px", background: "#160f0a", border: "1px solid rgba(180,150,100,0.16)", borderRadius: 3 };
const listSearchInput = { flex: 1, background: "transparent", border: "none", outline: "none", color: "#e8ddc9", fontSize: 16, fontFamily: "'Cormorant Garamond', serif" };

// Affichage d'étoiles avec remplissage fractionnaire (gère 0,25 / 0,5 / 0,75).
function Stars({ value, size }) {
  const v = Number(value) || 0;
  const px = size || 16;
  return (
    <span style={{ display: "inline-flex", gap: 2 }}>
      {[0, 1, 2, 3, 4].map((i) => {
        const fill = Math.max(0, Math.min(1, v - i)); // portion remplie de cette étoile (0..1)
        return (
          <span key={i} style={{ position: "relative", display: "inline-block", width: px, height: px, lineHeight: `${px}px`, fontSize: px }}>
            <span style={{ color: "#3a2f23" }}>★</span>
            <span style={{ position: "absolute", left: 0, top: 0, width: `${fill * 100}%`, overflow: "hidden", color: "#e7cd92", whiteSpace: "nowrap" }}>★</span>
          </span>
        );
      })}
    </span>
  );
}
const fieldBlockStyle = { marginBottom: 14 };
const fieldLabelStyle = { display: "block", fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "#8a7a60", marginBottom: 6 };
const fieldInputStyle = { width: "100%", padding: "11px 14px", background: "#160f0a", border: "1px solid rgba(180,150,100,0.18)", borderRadius: 3, color: "#e8ddc9", fontSize: 16, fontFamily: "'Cormorant Garamond', serif", outline: "none", boxSizing: "border-box" };

function Stat({ icon, label, value }) {
  return (
    <div style={styles.statCard}>
      <div style={styles.statIcon}>{icon}</div>
      <p style={styles.statLabel}>{label}</p>
      <p style={styles.statValue}>{value}</p>
    </div>
  );
}
